name: TATX Auto Push
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  push_data:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and Push Ultra
        run: |
          DATA=$(curl -sL "https://tinfoil.ultranx.ru/tinfoil/index.json")
          curl -X POST "http://neozteon.site/update.php" \
            --data-urlencode "key=TATX_SECRET_2026" \
            --data-urlencode "target=ultra" \
            --data-urlencode "json_data=$DATA"

      - name: Fetch and Push Ghost
        run: |
          DATA=$(curl -sL "https://nx.ghostland.at/index.json")
          curl -X POST "http://neozteon.site/update.php" \
            --data-urlencode "key=TATX_SECRET_2026" \
            --data-urlencode "target=ghost" \
            --data-urlencode "json_data=$DATA"
